name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run tests
        run: pytest -q --tb=short
      - name: Lint
        run: |
          pip install ruff
          ruff check ampro/ tests/

  leak-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify no host-framework imports leaked into the protocol package
        run: |
          # The protocol package must remain framework-agnostic. Detecting
          # imports of major Python web frameworks under ampro/ catches
          # accidental coupling. Tests + examples may use these.
          ! grep -rE "^(from|import) (django|flask|tornado|aiohttp|sanic)" ampro/
